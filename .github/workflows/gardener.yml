name: 5-Minute Gardener Watcher

on:
  schedule:
    - cron: '*/5 * * * *' # Runs every 5 minutes
  workflow_dispatch:      # Adds a "Run workflow" button in GitHub so you can test it manually

jobs:
  tend-to-garden:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Gardener Script
        env:
          # Pulls your secure data from GitHub Secrets
          CHIA_SEED: ${{ secrets.CHIA_SEED }}
          PLANT_LAUNCHER_ID: ${{ secrets.PLANT_LAUNCHER_ID }}
          FERTILIZER_ASSET_ID: ${{ secrets.FERTILIZER_ASSET_ID }}
        run: |
          python gardener.py
